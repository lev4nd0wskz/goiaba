<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>nao_existe_2</title>

<style>
body {
  margin: 0;
  background: black;
  color: #d0d0d0;
  font-family: monospace;
  overflow: hidden;
}

/* VHS */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 1px,
    transparent 3px
  );
}

/* imagem */
#img {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  opacity: 0.3;
  filter: grayscale(100%) contrast(250%);
}

/* terminal */
#terminal {
  position: absolute;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  background: rgba(0,0,0,0.85);
  padding: 20px;
  border: 1px solid #222;
}

/* glitch */
.glitch {
  animation: glitch 0.8s infinite;
}

@keyframes glitch {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}
</style>

</head>

<body onclick="start()">

<!-- imagem nova + fallback -->

<img id="img"
src="https://i.imgur.com/Z6X9ZQw.jpg"
onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/3/3f/Placeholder_view_vector.svg'">

<div id="terminal">...</div>

<script>
const mensagens = [
  "voce voltou",
  "...",
  "eu sabia que voltaria",
  "...",
  "a imagem foi removida",
  "...",
  "mas nao completamente",
  "...",
  "O 35 VAI MATAR MT NO MIX",
  "...",
  "FICA NEGATIVO AI",
  "...",
  "voce ficou olhando tempo demais",
  "...",
  "agora ela olha de volta",
  "...",
  "procure no codigo"
];

let i=0, j=0;
const term = document.getElementById("terminal");

function escrever(){
  if(j < mensagens[i].length){
    term.innerHTML = mensagens[i].substring(0, j+1);
    j++;
    setTimeout(escrever, 60);
  } else {
    setTimeout(()=>{
      j=0;
      i=(i+1)%mensagens.length;
      escrever();
    }, 2000);
  }
}

function start(){
  escrever();

  const img = document.getElementById("img");

  // glitch imagem
  setInterval(()=>{
    img.classList.toggle("glitch");
  },1500);

  // piscada estranha
  setInterval(()=>{
    img.style.opacity = Math.random()*0.6;
  },2000);

  // voz
  setInterval(()=>{
    const msg = new SpeechSynthesisUtterance("voce voltou");
    msg.rate = 0.6;
    msg.volume = 0.3;
    msg.lang="pt-BR";
    speechSynthesis.speak(msg);
  },6000);
}

   =====================

bmFvX2V4aXN0ZV8zLmh0bWw=

(quem decodificar chega na próxima fase)

*/
</script>

</body>
</html>
