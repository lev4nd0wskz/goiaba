<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NEGATIVO.PERTURBADOR</title>

<style>
body {
  margin: 0;
  background: black;
  color: #d0d0d0;
  font-family: monospace;
  overflow: hidden;
}

/* efeito VHS */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 2px
  );
  pointer-events: none;
}

/* terminal */
#terminal {
  position: absolute;
  top: 60%;
  left: 50%;
  width: 80%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  padding: 20px;
  border: 1px solid #333;
  font-size: 20px;
  line-height: 1.6;
}

/* rosto fundo */
#face {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 400px;
  transform: translate(-50%, -50%);
  opacity: 0;
  filter: grayscale(100%) contrast(200%);
  transition: opacity 5s;
  z-index: -1;
}

/* glitch leve */
.glitch {
  animation: glitch 2s infinite;
}

@keyframes glitch {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* jumpscare */
#jumpscare {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 999;
}
</style>

</head>

<body onclick="start()">

<img id="face" src="https://i.imgur.com/8Q2QZ5B.png">
<img id="jumpscare" src="https://i.imgur.com/8Q2QZ5B.png">

<div id="terminal">[ clique ]</div>

<script>
const mensagens = [
  "EU SOU GOIABA TF2 E SOU NEGATIVO...",
  "...",
  "VOCÊ ESTÁ SOZINHO?",
  "...",
  "FICA NEGATIVO AÍ...",
  "...",
  "O 35 VAI MATAR MT NO MIX...",
  "...",
  "EU CONSIGO TE VER",
  "...",
  "NÃO OLHE PARA TRÁS",
  "...",
  "TARDE DEMAIS"
];

let i = 0, j = 0;
const term = document.getElementById("terminal");

function escrever(){
  if(j < mensagens[i].length){
    term.innerHTML = mensagens[i].substring(0, j+1);
    j++;
    setTimeout(escrever, 70);
  } else {
    setTimeout(()=>{
      j = 0;
      i = (i+1)%mensagens.length;
      escrever();
    }, 2000 + Math.random()*2000);
  }
}

function start(){
  escrever();

  // rosto aparece devagar
  setTimeout(()=>{
    document.getElementById("face").style.opacity = 0.15;
  },5000);

  // aumenta presença
  setInterval(()=>{
    const face = document.getElementById("face");
    face.style.opacity = Math.random()*0.3;
  },4000);

  // voz perturbadora
  setInterval(()=>{
    const msg = new SpeechSynthesisUtterance("fica negativo ai");
    msg.rate = 0.6;
    msg.pitch = 0.5;
    msg.volume = 0.4;
    msg.lang="pt-BR";
    speechSynthesis.speak(msg);
  },7000);

  // jumpscare raro
  setInterval(()=>{
    if(Math.random() > 0.85){
      const j = document.getElementById("jumpscare");
      j.style.display="block";
      setTimeout(()=>j.style.display="none",150);
    }
  },5000);

  // glitch no texto
  setInterval(()=>{
    term.classList.toggle("glitch");
  },3000);
}
</script>

</body>
</html>
