<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>negativo_trol</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

#box {
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border: 2px solid #00ff88;
}

.glitch {
  animation: glitch 0.3s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(2px, 2px); }
  100% { transform: translate(-2px, -2px); }
}
</style>

</head>

<body>

<div id="box">
  <h1 class="glitch">ERRO 404 KKKKK</h1>
  <p>a imagem não existe… ou foi de base 💀</p>
  <p>FICA NEGATIVO AÍ 😎</p>
  <p>O 35 VAI MATAR MT NO MIX 🔥</p>
</div>

<script>
// zoeira piscando
setInterval(()=>{
  document.body.style.background = 
    Math.random() > 0.5 ? "black" : "#111";
},500);
</script>

</body>
</html>
