<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>arquivo_removido</title>

<style>
body {
  margin: 0;
  background: black;
  color: #cfcfcf;
  font-family: monospace;
  overflow: hidden;
}

/* VHS */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 1px,
    transparent 3px
  );
}

/* imagem */
#img {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  opacity: 0.25;
  filter: grayscale(100%) contrast(200%);
}

/* terminal */
#terminal {
  position: absolute;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border: 1px solid #222;
  font-size: 18px;
}

/* glitch */
.glitch {
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { opacity: 1; }
  50% { opacity: 0.4; }
  100% { opacity: 1; }
}
</style>

</head>

<body onclick="start()">

<!-- imagem imgur (mesmo quebrada) -->

<img id="img" src="https://i.imgur.com/8Q2QZ5B.png">

<div id="terminal">carregando...</div>

<script>
const mensagens = [
  "carregando imagem...",
  "erro",
  "a imagem nao existe mais",
  "...",
  "ou foi removida",
  "...",
  "mas voce ainda esta vendo",
  "...",
  "isso nao deveria ser possivel",
  "...",
  "O 35 VAI MATAR MT NO MIX",
  "...",
  "FICA NEGATIVO AI",
  "...",
  "pare de olhar",
  "...",
  "ela olha de volta"
];

let i=0, j=0;
const term = document.getElementById("terminal");

function escrever(){
  if(j < mensagens[i].length){
    term.innerHTML = mensagens[i].substring(0, j+1);
    j++;
    setTimeout(escrever, 60);
  } else {
    setTimeout(()=>{
      j=0;
      i=(i+1)%mensagens.length;
      escrever();
    }, 2500);
  }
}

function start(){
  escrever();

  const img = document.getElementById("img");

  // imagem instável
  setInterval(()=>{
    img.style.opacity = Math.random()*0.5;
  },2000);

  // glitch
  setInterval(()=>{
    img.classList.toggle("glitch");
  },1500);

  // voz
  setInterval(()=>{
    const msg = new SpeechSynthesisUtterance("fica negativo ai");
    msg.rate = 0.5;
    msg.volume = 0.3;
    msg.lang="pt-BR";
    speechSynthesis.speak(msg);
  },7000);
}
</script>

</body>
</html>
