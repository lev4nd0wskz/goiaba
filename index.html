<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Negativo</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: piscar 0.5s infinite alternate;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
      text-transform: uppercase;
    }

    p {
      font-size: 1.8rem;
      margin-top: 20px;
      color: red;
      font-weight: bold;
    }

    @keyframes piscar {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0.2;
        transform: scale(1.05);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>EU SOU GOIABA TF2 E SOU NEGATIVO</h1>
    <p>FICA NEGATIVO AÍ</p>
  </div>
</body>
</html>
